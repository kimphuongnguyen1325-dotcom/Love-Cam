<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Em Yêu Chị ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
position:relative;
}

/* Sao */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 2s infinite alternate;
}

@keyframes blink{
from{opacity:.2;}
to{
opacity:1;
box-shadow:0 0 12px white;
}
}

/* Tim bay */
.heart{
position:absolute;
color:#ff4d88;
font-size:24px;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

.box{
text-align:center;
z-index:10;
}

.bigHeart{
font-size:90px;
animation:beat 1s infinite;
filter:drop-shadow(0 0 20px red);
}

@keyframes beat{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.25);
}
}

h1{
font-size:55px;
color:#ff66cc;
text-shadow:
0 0 10px #ff66cc,
0 0 25px #ff66cc,
0 0 50px #ff66cc;
margin:20px 0;
}

p{
font-size:30px;
line-height:1.7;
color:#ff99dd;
text-shadow:0 0 12px #ff66cc;
}

.signature{
margin-top:35px;
font-size:26px;
color:#ff66cc;
text-shadow:
0 0 12px #ff66cc,
0 0 30px #ff66cc;
}
</style>

</head>

<body>

<div class="box">

<div class="bigHeart">❤️</div>

<h1>Em Yêu Chị</h1>

<p>
Không mong cầu xa xôi,<br>
chỉ mong thật chân thành.
</p>

<div class="signature">
💗 Yêu Chị - Bé Cam 💗
</div>

</div>

<script>

/* Sao */
for(let i=0;i<120;i++){

let s=document.createElement("div");
s.className="star";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

/* Tim bay */
for(let i=0;i<30;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="💗";

h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*5)+"s";
h.style.animationDelay=Math.random()*6+"s";

document.body.appendChild(h);

}

</script>

</body>
</html>
