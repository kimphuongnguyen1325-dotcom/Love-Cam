<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bé Cam 💌</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🌌 Background -->
<div class="stars"></div>
<div class="hearts"></div>
<div class="flowers"></div>
<div class="sparkles"></div>

<!-- 💌 Màn hình mở đầu -->
<div id="intro">
  <h1>💌 Bé Cam có điều muốn nói với Chị…</h1>
  <button onclick="start()">❤️ Chạm vào đây</button>
</div>

<!-- 💓 Tim đập -->
<div id="heartbeat">💓</div>

<!-- ⌨️ Text gõ từng dòng -->
<div id="typing">
  <p id="line1"></p>
  <p id="line2"></p>
  <p id="line3"></p>
</div>

<!-- 💗 Kết -->
<div id="signature">Mãi yêu Chị - Bé Cam 💗</div>

<!-- 🥺 lựa chọn -->
<div id="choice">
  <h2>Chị có yêu Em không?</h2>
  <button id="yes">Có ❤️</button>
  <button id="no">Không</button>
</div>

<!-- 🎵 nhạc -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
