<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Gửi Chị ❤️</title>

<link href="https://.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#000;
font-family:'Quicksand',sans-serif;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

color:white;

}

/* Nền */

#bg{

position:fixed;
left:0;
top:0;

width:100%;
height:100%;

overflow:hidden;

z-index:-1;

}

/* Khung */

.card{

width:90%;
max-width:700px;

text-align:center;

padding:40px;

border-radius:30px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(12px);

box-shadow:

0 0 40px rgba(255,105,180,.25);

}

/* Tim */

.heart{

font-size:90px;

animation:beat 1.2s infinite;

filter:drop-shadow(0 0 18px #ff3b6b);

}

@keyframes beat{

0%,100%{

transform:scale(1);

}

50%{

transform:scale(1.18);

}

}

/* Tiêu đề */

h1{

margin-top:20px;

font-size:52px;

font-weight:300;

letter-spacing:3px;

color:#ff8fc4;

text-shadow:

0 0 8px #ff8fc4,

0 0 22px #ff8fc4,

0 0 45px #ff8fc4;

}

/* Nội dung */

#text{

margin-top:40px;

font-size:28px;

line-height:2;

font-weight:300;

color:#ffe6f1;

min-height:180px;

}

/* Chữ ký */

.signature{

margin-top:40px;

font-size:22px;

font-weight:400;

letter-spacing:1px;

color:#ff8fc4;

opacity:0;

transition:1s;

}

/* Nút */

button{

margin-top:35px;

padding:14px 35px;

border:none;

border-radius:40px;

background:#ff5da8;

color:white;

font-size:20px;

font-family:'Quicksand';

cursor:pointer;

box-shadow:

0 0 20px #ff5da8;

transition:.3s;

}

button:hover{

transform:scale(1.08);

}

/* Intro */

#intro{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:black;

display:flex;

justify-content:center;
align-items:center;

flex-direction:column;

z-index:99;

}

#intro h2{

color:#ff8fc4;

font-weight:300;

font-size:38px;

text-align:center;

text-shadow:

0 0 15px #ff66cc;

margin-bottom:35px;

}

.fade{

animation:fade .8s forwards;

}

@keyframes fade{

to{

opacity:0;

visibility:hidden;

}

}

</style>

</head>

<body>

<div id="bg"></div>

<div id="intro">

<h2>

💌<br><br>

Bé Cam có điều muốn nói với Chị...

</h2>

<button onclick="startLove()">

Chạm vào đây ❤️

</button>

</div>

<div class="card">

<div class="heart">

❤️

</div>

<h1>

Gửi Chị

</h1>

<div id="text"></div>

<div class="signature">

💗 Mãi yêu Chị - Bé Cam 💗

</div>
  
<div id="question" style="display:none;margin-top:45px;">

<h2 style="color:#ffd6ec;font-weight:300;margin-bottom:25px;">
🥺 Chị có yêu Em không?
</h2>

<button id="yesBtn">
❤️ Có
</button>

<button id="noBtn"
style="margin-left:15px;background:#666;">
💔 Không
</button>

</div>

<div id="result"
style="
display:none;
margin-top:35px;
font-size:28px;
color:#ffd6ec;
line-height:1.8;
text-shadow:0 0 15px #ff77bb;
">

💖

<br><br>

Cảm ơn Chị...

<br>

Đã cho Em cơ hội được yêu thương Chị.

<br><br>

Em hứa sẽ luôn trân trọng Chị. ❤️

</div>
</div>

<script>
  
//=========================
// Nút "Không" chạy trốn
//=========================

const no=document.getElementById("noBtn");

no.addEventListener("mouseenter",moveNo);
no.addEventListener("touchstart",moveNo);

function moveNo(){

no.style.position="fixed";

no.style.left=Math.random()*80+"vw";

no.style.top=Math.random()*80+"vh";

}

//=========================
// Nút Có
//=========================

document.getElementById("yesBtn").onclick=function(){

document.getElementById("question").style.display="none";

document.getElementById("result").style.display="block";

fireworks();

}

//=========================
// Pháo tim
//=========================

function fireworks(){

for(let i=0;i<180;i++){

let h=document.createElement("div");

h.innerHTML="💖";

h.style.position="fixed";

h.style.left="50vw";

h.style.top="50vh";

h.style.fontSize=(18+Math.random()*16)+"px";

document.body.appendChild(h);

let angle=Math.random()*360;

let speed=3+Math.random()*5;

let x=0;

let y=0;

let timer=setInterval(()=>{

x+=Math.cos(angle*Math.PI/180)*speed;

y+=Math.sin(angle*Math.PI/180)*speed;

h.style.transform=`translate(${x}px,${y}px)`;

h.style.opacity-=0.015;

if(h.style.opacity<=0){

clearInterval(timer);

h.remove();

}

},16);

}

}
const message=[

"Không cần những điều quá lớn lao.",

"Chỉ mong mỗi ngày đều được ở bên Chị.",

"Cảm ơn Chị vì đã xuất hiện trong cuộc đời Em. ❤️"

];

let i=0;

function type(){

if(i>=message.length){

document.querySelector(".signature").style.opacity=1;
  setTimeout(()=>{

document.getElementById("question").style.display="block";

},1500);

return;

}

let p=document.createElement("div");

p.style.margin="18px";

document.getElementById("text").appendChild(p);

let t=0;

let txt=message[i];

let timer=setInterval(()=>{

p.innerHTML=txt.substring(0,t);

t++;

if(t>txt.length){

clearInterval(timer);

i++;

setTimeout(type,700);

}

},45);

}

function startLove(){

document.getElementById("intro").classList.add("fade");

setTimeout(type,700);

}

</<script>

//=======================
// Nội dung hiện từng dòng
//=======================

const message=[
"Không cần những điều quá lớn lao.",
"Chỉ mong mỗi ngày đều được ở bên Chị.",
"Cảm ơn Chị vì đã xuất hiện trong cuộc đời Em. ❤️"
];

let i=0;

function type(){

if(i>=message.length){

document.querySelector(".signature").style.opacity=1;

return;

}

let p=document.createElement("div");

p.style.margin="18px";

document.getElementById("text").appendChild(p);

let t=0;

let timer=setInterval(()=>{

p.innerHTML=txt.substring(0,t);

if(t>txt.length){

i++;

setTimeout(type,700);

}

},45);

}

function startLove(){

document.getElementById("intro").classList.add("fade");

setTimeout(type,700);

createStars();
createHearts();
createPetals();

}

//=======================
// Sao
//=======================

function createStars(){

for(let i=0;i<150;i++){

let s=document.createElement("div");

s.style.position="absolute";
s.style.width="2px";
s.style.height="2px";
s.style.background="white";
s.style.borderRadius="50%";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

s.style.opacity=Math.random();

s.animate([

{opacity:.2},

{opacity:1}

],{

duration:1000+Math.random()*3000,

iterations:Infinity,

direction:"alternate"

});

document.getElementById("bg").appendChild(s);

}

}

//=======================
// Tim bay
//=======================

function createHearts(){

setInterval(()=>{

let h=document.createElement("div");

h.innerHTML="💗";

h.style.position="fixed";

h.style.left=Math.random()*100+"vw";

h.style.bottom="-40px";

h.style.fontSize=(20+Math.random()*20)+"px";

h.style.pointerEvents="none";

document.body.appendChild(h);

let y=0;

let timer=setInterval(()=>{

y+=2;

h.style.bottom=y+"px";

h.style.opacity=1-y/900;

if(y>900){

clearInterval(timer);

h.remove();

}

},16);

},350);

}

//=======================
// Hoa anh đào
//=======================

function createPetals(){

setInterval(()=>{

let p=document.createElement("div");

p.innerHTML="🌸";

p.style.position="fixed";

p.style.left=Math.random()*100+"vw";

p.style.top="-30px";

p.style.fontSize=(16+Math.random()*18)+"px";

document.body.appendChild(p);

let y=0;

let x=0;

let timer=setInterval(()=>{

y+=1.5;

x=Math.sin(y/35)*30;

p.style.transform="translate("+x+"px,"+y+"px) rotate("+y+"deg)";

p.style.opacity=1-y/900;

if(y>950){

clearInterval(timer);

p.remove();

}

},16);

},700);

}

//=======================
// Chạm màn hình nổ tim
//=======================

document.addEventListener("click",function(e){

for(let i=0;i<18;i++){

let h=document.createElement("div");

h.innerHTML="❤️";

h.style.position="fixed";

h.style.left=e.clientX+"px";

h.style.top=e.clientY+"px";

document.body.appendChild(h);

let angle=Math.random()*360;

let speed=2+Math.random()*3;

let x=0;
let y=0;

let timer=setInterval(()=>{

x+=Math.cos(angle*Math.PI/180)*speed;

y+=Math.sin(angle*Math.PI/180)*speed;

h.style.transform=`translate(${x}px,${y}px)`;

h.style.opacity-=0.03;

if(h.style.opacity<=0){

clearInterval(timer);

h.remove();

}

},16);

}

});

</script>>
  


</body>
</html>ê
