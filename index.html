<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💌 Bé Cam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;
overflow:hidden;

font-family:'Poppins',sans-serif;

background:#000;

}

/*==========================
      VŨ TRỤ
==========================*/

body{

background:
radial-gradient(circle at 20% 20%,rgba(102,0,255,.10),transparent 30%),
radial-gradient(circle at 80% 40%,rgba(255,0,120,.08),transparent 30%),
radial-gradient(circle at center,#050505,#000 80%);

}

/* Nebula */

.nebula{

position:fixed;

width:200%;

height:200%;

left:-50%;

top:-50%;

background:

radial-gradient(circle,#6d00ff22 0%,transparent 45%),

radial-gradient(circle,#ff149322 0%,transparent 40%),

radial-gradient(circle,#00ccff18 0%,transparent 45%);

filter:blur(80px);

animation:nebulaMove 40s linear infinite;

z-index:0;

}

@keyframes nebulaMove{

0%{

transform:translate(0,0) rotate(0deg);

}

100%{

transform:translate(-5%,-3%) rotate(360deg);

}

}

/*==========================
      STARS
==========================*/

#stars{

position:fixed;

width:100%;

height:100%;

overflow:hidden;

z-index:1;

}

.star{

position:absolute;

background:white;

border-radius:50%;

opacity:.2;

animation:twinkle linear infinite;

will-change:transform,opacity;

}

@keyframes twinkle{

0%,100%{

opacity:.15;

transform:scale(.7);

}

50%{

opacity:1;

transform:scale(2);

}

}

/*==========================
      SHOOTING STAR
==========================*/

.shooting{

position:absolute;

width:2px;

height:140px;

background:linear-gradient(transparent,white);

opacity:0;

transform:rotate(45deg);

animation:shoot 2.5s linear forwards;

}

@keyframes shoot{

0%{

opacity:0;

transform:translate(0,0) rotate(45deg);

}

10%{

opacity:1;

}

100%{

opacity:0;

transform:translate(-800px,800px) rotate(45deg);

}

}

/*==========================
      INTRO
==========================*/

#intro{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

text-align:center;

z-index:20;

width:90%;

}

#intro h1{

font-size:38px;

font-weight:300;

color:#ff77dd;

text-shadow:

0 0 8px #ff69b4,

0 0 25px #ff1493,

0 0 45px rgba(255,20,147,.4);

margin-bottom:35px;

line-height:1.4;

}

/*==========================
      BUTTON
==========================*/

button{

padding:14px 32px;

border:none;

border-radius:40px;

font-size:18px;

font-weight:500;

cursor:pointer;

color:white;

background:linear-gradient(45deg,#ff5fa8,#ff1493);

box-shadow:

0 0 15px #ff1493,

0 0 35px rgba(255,20,147,.4);

transition:.25s;

}

button:hover{

transform:scale(1.08);

box-shadow:

0 0 30px #ff69b4,

0 0 60px #ff1493;

}

/*==========================
      HEART
==========================*/

#heartbeat{

position:absolute;

left:50%;

top:10%;

transform:translateX(-50%);

font-size:75px;

z-index:20;

animation:heartbeat 1.3s cubic-bezier(.68,-0.55,.27,1.55) infinite;

}

@keyframes heartbeat{

0%,100%{

transform:translateX(-50%) scale(1);

}

20%{

transform:translateX(-50%) scale(1.35);

}

40%{

transform:translateX(-50%) scale(1);

}

60%{

transform:translateX(-50%) scale(1.25);

}

}

/*==========================
      TEXT
==========================*/

#typing{

position:absolute;

top:28%;

left:50%;

transform:translateX(-50%);

width:90%;

text-align:center;

z-index:20;

}

#typing p{

font-size:24px;

font-weight:300;

line-height:1.8;

color:#ffd4f3;

text-shadow:

0 0 10px #ff69b4,

0 0 25px rgba(255,105,180,.5);

min-height:38px;

}

/*==========================
      SIGNATURE
==========================*/

#signature{

position:absolute;

bottom:15%;

width:100%;

text-align:center;

font-size:28px;

display:none;

color:#ff8ed0;

text-shadow:0 0 20px #ff1493;

z-index:20;

}

/*==========================
      CHOICE
==========================*/

#choice{

position:absolute;

top:58%;

left:50%;

transform:translateX(-50%);

text-align:center;

display:none;

z-index:30;

width:100%;

}

#choice h2{

margin-bottom:25px;

font-weight:300;

color:white;

text-shadow:0 0 15px #ff69b4;

}

/*==========================
      FLOAT HEART
==========================*/

.float-heart{

position:absolute;

pointer-events:none;

font-size:22px;

animation:floatHeart 1.6s ease-out forwards;

}

@keyframes floatHeart{

0%{

opacity:1;

transform:translateY(0) scale(1);

}

100%{

opacity:0;

transform:translateY(-150px) scale(2);

}

}

/*==========================
      FIREWORK
==========================*/

.fire{

position:absolute;

width:8px;

height:8px;

border-radius:50%;

background:#ff66cc;

pointer-events:none;

animation:explode .9s linear forwards;

}

@keyframes explode{

100%{

opacity:0;

transform:
translate(var(--x),var(--y))
scale(0);

}

}
  </style>

</head>

<body>

<div class="nebula"></div>

<div id="stars"></div>

<div id="heartbeat">
💓
</div>

<div id="intro">

<h1>
💌 Bé Cam có điều muốn nói với Chị...
</h1>

<button id="startBtn">
❤️ Chạm vào đây
</button>

</div>

<div id="typing">

<p id="line1"></p>

<p id="line2"></p>

<p id="line3"></p>

</div>

<div id="signature">

Mãi yêu Chị — Bé Cam ❤️

</div>

<div id="choice">

<h2>
Chị có yêu Em không dạ?
</h2>

<button id="yes">
Có ❤️
</button>

<button id="no">
Không 😝
</button>

</div>

<audio
id="music"
loop>

<source
src="music.mp3"
type="audio/mpeg">

</audio>

<script>

const stars=document.getElementById("stars");

const intro=document.getElementById("intro");

const signature=document.getElementById("signature");

const choice=document.getElementById("choice");

const music=document.getElementById("music");

const yes=document.getElementById("yes");

const no=document.getElementById("no");

const startBtn=document.getElementById("startBtn");

/*==========================
        STAR FIELD
==========================*/

function createStars(){

const frag=document.createDocumentFragment();

for(let i=0;i<450;i++){

const s=document.createElement("div");

s.className="star";

const size=Math.random()*2.4+.5;

s.style.width=size+"px";

s.style.height=size+"px";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDuration=
2+Math.random()*5+"s";

s.style.animationDelay=
Math.random()*5+"s";

frag.appendChild(s);

}

stars.appendChild(frag);

}

/*==========================
      SHOOTING STAR
==========================*/

function shootingStar(){

const s=document.createElement("div");

s.className="shooting";

s.style.left=
Math.random()*window.innerWidth+"px";

s.style.top=
Math.random()*250+"px";

document.body.appendChild(s);

setTimeout(()=>{

s.remove();

},2500);

}

setInterval(()=>{

shootingStar();

},2200);

/*==========================
      MUSIC FADE IN
==========================*/

function fadeMusic(){

music.volume=0;

music.play().catch(()=>{});

let v=0;

const fade=setInterval(()=>{

v+=0.02;

music.volume=Math.min(v,.5);

if(v>=.5){

clearInterval(fade);

}

},100);

}

/*==========================
      START
==========================*/

startBtn.onclick=()=>{

intro.style.display="none";

createStars();

fadeMusic();

typeText();

};

/*==========================
      TYPE EFFECT
==========================*/

const texts=[

"Em nhớ Chị nhiều lắm...",

"Mỗi ngày trôi qua đều nghĩ về Chị...",

"Em muốn hỏi Chị một điều..."

];

async function typeText(){

for(let i=0;i<texts.length;i++){

await typeLine(

document.getElementById("line"+(i+1)),

texts[i]

);

await wait(600);

}

signature.style.display="block";

await wait(800);

choice.style.display="block";

}

function wait(ms){

return new Promise(r=>setTimeout(r,ms));

}

function typeLine(el,text){

return new Promise(resolve=>{

let i=0;

function frame(){

el.textContent=text.substring(0,i);

i++;

if(i<=text.length){

requestAnimationFrame(frame);

}else{

resolve();

}

}

frame();

});

}

/*==========================
      HEART CLICK
==========================*/

document.addEventListener("click",e=>{

const h=document.createElement("div");

h.className="float-heart";

h.innerHTML="💖";

h.style.left=e.clientX+"px";

h.style.top=e.clientY+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},1600);

});
  /*==========================
      NO BUTTON RUN AWAY
==========================*/

let noMoveCount=0;

function moveNoButton(){

const padding=20;

const maxX=window.innerWidth-no.offsetWidth-padding;

const maxY=window.innerHeight-no.offsetHeight-padding;

const x=Math.random()*maxX;

const y=Math.random()*maxY;

no.style.position="fixed";
no.style.left=x+"px";
no.style.top=y+"px";

noMoveCount++;

if(noMoveCount>15){

no.innerHTML="🥺 Tha cho Em...";

}

}

no.addEventListener("mouseenter",moveNoButton);

no.addEventListener("touchstart",(e)=>{

e.preventDefault();

moveNoButton();

});

/*==========================
      FIREWORK
==========================*/

function firework(x,y){

for(let i=0;i<40;i++){

const p=document.createElement("div");

p.className="fire";

const angle=Math.random()*Math.PI*2;

const distance=80+Math.random()*120;

const dx=Math.cos(angle)*distance+"px";

const dy=Math.sin(angle)*distance+"px";

p.style.left=x+"px";

p.style.top=y+"px";

p.style.setProperty("--x",dx);

p.style.setProperty("--y",dy);

document.body.appendChild(p);

setTimeout(()=>{

p.remove();

},900);

}

}

/*==========================
      HEART RAIN
==========================*/

function heartRain(){

const h=document.createElement("div");

h.innerHTML="💖";

h.style.position="fixed";

h.style.left=Math.random()*100+"vw";

h.style.top="-40px";

h.style.fontSize=18+Math.random()*28+"px";

h.style.pointerEvents="none";

h.style.transition="transform 6s linear, opacity 6s linear";

document.body.appendChild(h);

requestAnimationFrame(()=>{

h.style.transform="translateY(110vh)";

h.style.opacity="0";

});

setTimeout(()=>{

h.remove();

},6000);

}

function startHeartRain(){

for(let i=0;i<120;i++){

setTimeout(()=>{

heartRain();

},i*120);

}

}

/*==========================
      LOVE MESSAGE
==========================*/

function showLoveMessage(){

const box=document.createElement("div");

box.style.position="fixed";

box.style.left="50%";

box.style.top="50%";

box.style.transform="translate(-50%,-50%) scale(.5)";

box.style.padding="28px 35px";

box.style.borderRadius="22px";

box.style.background="rgba(20,20,20,.78)";

box.style.backdropFilter="blur(15px)";

box.style.border="1px solid rgba(255,255,255,.15)";

box.style.color="white";

box.style.fontSize="28px";

box.style.textAlign="center";

box.style.boxShadow="0 0 40px rgba(255,20,147,.5)";

box.style.zIndex="9999";

box.style.transition=".5s";

box.innerHTML="💗<br><br>I Love You<br>Forever 💖";

document.body.appendChild(box);

requestAnimationFrame(()=>{

box.style.transform="translate(-50%,-50%) scale(1)";

});

setTimeout(()=>{

box.style.opacity="0";

},4500);

setTimeout(()=>{

box.remove();

},5200);

}

/*==========================
      YES BUTTON
==========================*/

yes.addEventListener("click",(e)=>{

const rect=yes.getBoundingClientRect();

firework(

rect.left+rect.width/2,

rect.top+rect.height/2

);

startHeartRain();

showLoveMessage();

yes.innerHTML="💖 Em biết mà 💖";

});

/*==========================
      RESIZE
==========================*/

window.addEventListener("resize",()=>{

if(no.style.position==="fixed"){

moveNoButton();

}

});

/*==========================
      END
==========================*/

</script>

</body>

</html>
