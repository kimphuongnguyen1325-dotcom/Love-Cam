<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bé Cam 💌</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000; /* 🌌 nền đen */
  font-family: Arial;
  color: #ffb6ff;
}

/* ⭐ sao lấp lánh */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite ease-in-out;
  opacity: 0.3;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.8); }
}

/* 💖 chữ hồng phát sáng */
.glow-text {
  color: #ff69b4;
  font-weight: 300; /* nét mảnh */
  text-shadow:
    0 0 5px #ff69b4,
    0 0 10px #ff69b4,
    0 0 20px #ff1493;
}

/* 💌 intro */
#intro {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
}

/* 💓 tim đập */
#heartbeat {
  font-size: 60px;
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  animation: beat 1s infinite;
  filter: drop-shadow(0 0 10px #ff69b4);
}

@keyframes beat {
  0%,100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.3); }
}

/* ⌨️ typing */
#typing {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  font-size: 20px;
}

/* 💗 signature */
#signature {
  position: absolute;
  bottom: 10%;
  width: 100%;
  text-align: center;
  font-size: 24px;
  display: none;
}

/* 🥺 choice */
#choice {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  display: none;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #ff69b4;
  color: white;
  font-weight: 300;
  box-shadow: 0 0 10px #ff69b4;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff1493;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div id="intro">
  <h1 class="glow-text">💌 Bé Cam có điều muốn nói với Chị…</h1>
  <button onclick="start()">❤️ Chạm vào đây</button>
</div>

<div id="heartbeat">💓</div>

<div id="typing">
  <p id="line1" class="glow-text"></p>
  <p id="line2" class="glow-text"></p>
  <p id="line3" class="glow-text"></p>
</div>

<div id="signature" class="glow-text">
  Mãi yêu Chị - Bé Cam 💗
</div>

<div id="choice">
  <h2 class="glow-text">Chị có yêu Em không?</h2>
  <button id="yes">Có ❤️</button>
  <button id="no">Không</button>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* ⭐ tạo sao lấp lánh */
function createStars() {
  const stars = document.getElementById("stars");

  for (let i = 0; i < 120; i++) {
    let s = document.createElement("div");
    s.className = "star";
    let size = Math.random() * 3 + 1;

    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDuration = (Math.random() * 3 + 1) + "s";

    stars.appendChild(s);
  }
}

function start() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("music").play();

  typeText();
  createStars();
}

/* ⌨️ typing */
function typeText() {
  const lines = [
    "Em nhớ Chị nhiều lắm…",
    "Từng ngày trôi qua đều là Chị…",
    "Và Em chỉ muốn nói rằng…"
  ];

  let el = 0;
  let i = 0;

  function typing() {
    if (el < lines.length) {
      let target = document.getElementById("line" + (el + 1));
      target.innerHTML += lines[el][i];
      i++;

      if (i < lines[el].length) {
        setTimeout(typing, 70);
      } else {
        i = 0;
        el++;
        setTimeout(typing, 500);
      }
    } else {
      document.getElementById("signature").style.display = "block";
      document.getElementById("choice").style.display = "block";
    }
  }
  typing();
}

/* 🥺 nút chạy trốn */
document.addEventListener("DOMContentLoaded", () => {
  const no = document.getElementById("no");
  const yes = document.getElementById("yes");

  no.addEventListener("mouseover", () => {
    no.style.position = "absolute";
    no.style.left = Math.random() * 80 + "%";
    no.style.top = Math.random() * 80 + "%";
  });

  yes.addEventListener("click", () => {
    alert("💗 Em biết mà… mãi yêu Chị 🍊 💗");
  });
});
</script>

</body>
</html>
