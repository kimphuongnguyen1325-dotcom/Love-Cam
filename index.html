<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bé Cam 💌</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #050505, #000);
  font-family: Arial;
  color: #ffb6ff;
}

/* 🌌 nền vũ trụ mờ */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.3;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%,100% { transform: scale(1); opacity: 0.2; }
  50% { transform: scale(2); opacity: 1; }
}

/* 💖 glow text PRO */
.glow-text {
  color: #ff69b4;
  font-weight: 300;
  text-shadow:
    0 0 5px #ff69b4,
    0 0 15px #ff1493,
    0 0 25px rgba(255, 20, 147, 0.5);
}

/* 💌 intro */
#intro {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  z-index: 10;
}

/* 💓 heartbeat PRO */
#heartbeat {
  font-size: 65px;
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  animation: beat 1s infinite;
  z-index: 10;
}

@keyframes beat {
  0%,100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.4); }
}

/* ⌨️ typing */
#typing {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  font-size: 22px;
  z-index: 10;
}

/* 💗 signature */
#signature {
  position: absolute;
  bottom: 12%;
  width: 100%;
  text-align: center;
  display: none;
  font-size: 24px;
  z-index: 10;
}

/* 🥺 choice */
#choice {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  display: none;
  z-index: 10;
}

/* 💖 button PRO */
button {
  padding: 12px 22px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(45deg, #ff69b4, #ff1493);
  color: white;
  box-shadow: 0 0 15px #ff69b4;
  transition: 0.2s;
  font-weight: 300;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #ff1493;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div id="intro">
  <h1 class="glow-text">💌 Bé Cam có điều muốn nói với Chị…</h1>
  <button onclick="start()">❤️ Chạm vào đây</button>
</div>

<div id="heartbeat">💓</div>

<div id="typing">
  <p id="line1" class="glow-text"></p>
  <p id="line2" class="glow-text"></p>
  <p id="line3" class="glow-text"></p>
</div>

<div id="signature" class="glow-text">
  Mãi yêu Chị - Bé Cam 💗
</div>

<div id="choice">
  <h2 class="glow-text">Chị có yêu Em không?</h2>
  <button id="yes">Có ❤️</button>
  <button id="no">Không</button>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* 🌌 star galaxy PRO */
function createStars() {
  const stars = document.getElementById("stars");

  for (let i = 0; i < 200; i++) {
    let s = document.createElement("div");
    s.className = "star";

    let size = Math.random() * 2.5;

    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDuration = (Math.random() * 4 + 2) + "s";

    stars.appendChild(s);
  }
}

function start() {
  document.getElementById("intro").style.display = "none";

  const music = document.getElementById("music");
  music.volume = 0.5;
  music.play().catch(()=>{});

  createStars();
  typeText();
}

/* ⌨️ typing PRO smooth */
function typeText() {
  const lines = [
    "Em nhớ Chị nhiều lắm…",
    "Từng ngày trôi qua đều là Chị…",
    "Và Em chỉ muốn nói rằng…"
  ];

  let el = 0;
  let i = 0;

  function typing() {
    if (el < lines.length) {

      let target = document.getElementById("line" + (el + 1));

      target.innerHTML = lines[el].slice(0, i);

      i++;

      if (i <= lines[el].length) {
        setTimeout(typing, 55);
      } else {
        i = 0;
        el++;
        setTimeout(typing, 600);
      }

    } else {
      document.getElementById("signature").style.display = "block";
      document.getElementById("choice").style.display = "block";
    }
  }

  typing();
}

/* 🥺 button AI chạy trốn PRO */
document.addEventListener("DOMContentLoaded", () => {

  const no = document.getElementById("no");
  const yes = document.getElementById("yes");

  no.addEventListener("mouseover", () => {
    no.style.position = "absolute";
    no.style.left = Math.random() * 85 + "%";
    no.style.top = Math.random() * 80 + "%";
  });

  yes.addEventListener("click", () => {
    alert("💗 Em biết mà… mãi yêu Chị 💗");
  });

});

/* 💖 click tạo tim bay PRO */
document.addEventListener("click", (e) => {
  let heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.style.position = "absolute";
  heart.style.left = e.clientX + "px";
  heart.style.top = e.clientY + "px";
  heart.style.fontSize = "18px";
  heart.style.opacity = 0.8;
  heart.style.transition = "1s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.style.top = (e.clientY - 80) + "px";
    heart.style.opacity = 0;
  }, 50);

  setTimeout(() => heart.remove(), 1000);
});

</script>

</body>
</html>
