<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em Yêu Chị ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.box{
    text-align:center;
    color:#ff66cc;
    animation:spin 12s linear infinite;
}

h1{
    font-size:56px;
    margin:0;
    text-shadow:
    0 0 10px #ff66cc,
    0 0 25px #ff66cc,
    0 0 50px #ff66cc;
}

p{
    margin-top:30px;
    font-size:28px;
    line-height:1.7;
    text-shadow:0 0 8px #ff66cc;
}

.signature{
    margin-top:35px;
    font-size:24px;
    font-style:italic;
    text-shadow:
    0 0 8px #ff66cc,
    0 0 20px #ff66cc;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>

</head>

<body>

<div class="box">
    <h1>❤️ Em Yêu Chị ❤️</h1>

    <p>
        Không mong cầu xa xôi,<br>
        chỉ mong thật chân thành.
    </p>

    <div class="signature">
        💗 Yêu Chị - Bé Cam 💗
    </div>
</div>

</body>
</html>
